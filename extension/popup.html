<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upwork Profile Optimizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080c10;
            --surface: #0d1117;
            --surface2: #161b22;
            --border: #21262d;
            --border2: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --dim: #484f58;
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.1);
            --green-border: rgba(34, 197, 94, 0.2);
        }

        body {
            width: 380px;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--green-dim);
            border: 1px solid var(--green-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            color: var(--green);
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            background: var(--green-dim);
            border: 1px solid var(--green-border);
            color: var(--green);
        }

        /* Body */
        .body {
            padding: 18px;
        }

        /* API Key section */
        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 8px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 10px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: rgba(34, 197, 94, 0.5);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.08);
        }

        ::placeholder {
            color: var(--dim);
        }

        .hint {
            font-size: 11px;
            color: var(--dim);
            margin-bottom: 14px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .hint svg {
            flex-shrink: 0;
            color: rgba(34, 197, 94, 0.6);
        }

        .btn-primary {
            width: 100%;
            padding: 11px 16px;
            background: var(--green);
            border: none;
            border-radius: 10px;
            color: #0a1a0a;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #16a34a;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-secondary {
            width: 100%;
            padding: 10px 16px;
            margin-top: 8px;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 10px;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            border-color: var(--green-border);
            color: var(--green);
            background: var(--green-dim);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        /* Status */
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            margin-bottom: 14px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.active {
            background: var(--green);
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
            animation: pulse 2s infinite;
        }

        .status-dot.inactive {
            background: var(--dim);
        }

        .status-text {
            font-size: 12px;
            color: var(--muted);
        }

        .status-text strong {
            color: var(--text);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Open dashboard link */
        .open-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            transition: border-color 0.15s;
        }

        .open-link:hover {
            border-color: var(--green-border);
            background: var(--green-dim);
        }

        .open-link-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .open-link-icon {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: var(--green-dim);
            border: 1px solid var(--green-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .open-link-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .open-link-sub {
            font-size: 11px;
            color: var(--dim);
        }

        /* Footer */
        .footer {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            font-size: 11px;
            color: var(--dim);
            text-align: center;
        }

        .footer a {
            color: rgba(34, 197, 94, 0.7);
            text-decoration: none;
        }

        .footer a:hover {
            color: var(--green);
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
            </div>
            <span class="logo-text">Profile Optimizer</span>
        </div>
        <span class="badge">AI Powered</span>
    </div>

    <div class="body">
        <!-- API Key -->
        <div class="section-label">Anthropic API Key</div>
        <div class="input-wrap">
            <input type="password" id="apiKey" placeholder="sk-ant-api03-..." />
        </div>
        <div class="hint">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            Stored locally. Never sent to our servers.
        </div>

        <button class="btn-primary" id="saveBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                <polyline points="17 21 17 13 7 13 7 21" />
                <polyline points="7 3 7 8 15 8" />
            </svg>
            Save API Key
        </button>

        <div class="divider"></div>

        <!-- Page status -->
        <div class="status-row" id="statusRow">
            <div class="status-dot inactive" id="statusDot"></div>
            <div class="status-text" id="statusText">Navigate to an Upwork freelancer profile to analyze</div>
        </div>

        <!-- Open full dashboard -->
        <a class="open-link" id="openDashboard" href="#" target="_blank">
            <div class="open-link-left">
                <div class="open-link-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                </div>
                <div>
                    <div class="open-link-title">Full Dashboard</div>
                    <div class="open-link-sub">Manually enter & analyze any profile</div>
                </div>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#484f58" stroke-width="2">
                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" />
                <polyline points="15 3 21 3 21 9" />
                <line x1="10" y1="14" x2="21" y2="3" />
            </svg>
        </a>
    </div>

    <div class="footer">
        Don't have a key? <a href="https://console.anthropic.com/keys" target="_blank">Get one free →</a>
    </div>

    <script src="popup.js"></script>
</body>

</html>
